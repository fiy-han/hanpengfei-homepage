<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《韩鹏飞》一本仍在书写中的书</title>
  <style>
    :root {
      color-scheme: light dark;
      --ink: #12100d;
      --paper: #f4eddf;
      --paper-2: #ebe0ce;
      --text: #1d1a15;
      --muted: rgba(29, 26, 21, .64);
      --line: rgba(29, 26, 21, .16);
      --ember: #a24d32;
      --sea: #577c84;
      --night: #05070a;
      --cream: rgba(244, 237, 223, .94);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--night);
      color: var(--text);
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      overflow: hidden;
    }

    button {
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .book {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      background:
        linear-gradient(90deg, rgba(5,7,10,.72), rgba(5,7,10,.1) 46%, rgba(5,7,10,.7)),
        linear-gradient(180deg, rgba(5,7,10,.12), rgba(5,7,10,.76)),
        url("assets/wenchang-sunset.png") center / cover;
    }

    .book::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 4px),
        radial-gradient(circle at 50% 52%, transparent 0 48%, rgba(0,0,0,.38) 100%);
      opacity: .58;
    }

    .menu-button {
      position: fixed;
      z-index: 30;
      top: 28px;
      left: 28px;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(244,237,223,.28);
      background: rgba(5,7,10,.28);
      color: var(--cream);
      backdrop-filter: blur(14px);
      font-size: 24px;
      line-height: 1;
    }

    .reader-tools {
      position: fixed;
      z-index: 30;
      top: 28px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--cream);
    }

    .progress-pill,
    .tool-button {
      border: 1px solid rgba(244,237,223,.28);
      background: rgba(5,7,10,.28);
      color: var(--cream);
      backdrop-filter: blur(14px);
      min-height: 42px;
      padding: 0 14px;
      letter-spacing: .08em;
    }

    .tool-button {
      min-width: 42px;
      font-size: 18px;
    }

    .popover {
      position: fixed;
      z-index: 45;
      top: 82px;
      right: 28px;
      width: min(360px, calc(100vw - 44px));
      display: none;
      padding: 18px;
      border: 1px solid rgba(244,237,223,.18);
      background: rgba(5,7,10,.86);
      color: var(--cream);
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 90px rgba(0,0,0,.42);
    }

    .popover.is-open {
      display: block;
    }

    .popover h3 {
      margin: 0 0 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 24px;
      font-weight: 400;
    }

    .popover input {
      width: 100%;
      border: 1px solid rgba(244,237,223,.2);
      background: rgba(244,237,223,.08);
      color: var(--cream);
      padding: 10px;
      outline: none;
    }

    .result-list,
    .action-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .result-list button,
    .action-list button {
      border: 1px solid rgba(244,237,223,.14);
      background: rgba(244,237,223,.06);
      color: var(--cream);
      padding: 10px;
      text-align: left;
    }

    .menu {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(5,7,10,.72);
      backdrop-filter: blur(18px);
      color: var(--cream);
      padding: clamp(38px, 7vw, 90px);
    }

    .menu.is-open {
      display: grid;
      align-content: center;
    }

    .menu-grid {
      width: min(760px, 100%);
      display: grid;
      gap: 8px;
      margin: 0 auto;
    }

    .menu-title {
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(244,237,223,.2);
      color: rgba(244,237,223,.58);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .36em;
      text-transform: uppercase;
    }

    .menu-grid button {
      border: 0;
      border-bottom: 1px solid rgba(244,237,223,.16);
      background: transparent;
      padding: 16px 0;
      text-align: left;
      color: var(--cream);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(22px, 3vw, 36px);
      letter-spacing: .08em;
    }

    .menu-grid small {
      display: block;
      margin-top: 6px;
      color: rgba(244,237,223,.42);
      font-family: "Microsoft YaHei UI", sans-serif;
      font-size: 12px;
      letter-spacing: .12em;
    }

    .menu-grid button:hover {
      color: #ffd0a7;
    }

    .view {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      opacity: 0;
      visibility: hidden;
      transform: translateY(16px);
      transition: opacity .5s ease, transform .5s ease, visibility .5s;
    }

    .view.is-active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .cover {
      place-items: center;
      padding: 28px;
      color: var(--cream);
      text-align: center;
    }

    .cover-panel {
      width: min(980px, 100%);
      padding: clamp(38px, 8vw, 96px);
      border: 1px solid rgba(244,237,223,.18);
      background: linear-gradient(180deg, rgba(5,7,10,.26), rgba(5,7,10,.52));
      backdrop-filter: blur(8px);
      box-shadow: 0 40px 140px rgba(0,0,0,.38);
    }

    .roman-name {
      display: grid;
      gap: 2px;
      margin-top: 26px;
      color: rgba(244,237,223,.82);
      font-family: "Times New Roman", Georgia, serif;
      font-size: clamp(36px, 7vw, 92px);
      line-height: .88;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .kicker {
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .34em;
      text-transform: uppercase;
      color: rgba(244,237,223,.74);
    }

    h1 {
      margin: 28px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(42px, 7vw, 92px);
      line-height: .92;
      font-weight: 400;
      letter-spacing: .1em;
      text-shadow: 0 18px 46px rgba(0,0,0,.55);
    }

    .cover-subtitle {
      margin-top: 24px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(18px, 2vw, 28px);
      letter-spacing: .16em;
      color: rgba(244,237,223,.86);
    }

    .cover-line {
      width: min(360px, 70%);
      height: 1px;
      margin: 30px auto 0;
      background: linear-gradient(90deg, transparent, rgba(244,237,223,.58), transparent);
    }

    .cover-actions,
    .chapter-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 42px;
    }

    .cover-actions button,
    .chapter-actions button,
    .today-card button {
      border: 1px solid rgba(244,237,223,.28);
      background: rgba(244,237,223,.08);
      color: var(--cream);
      padding: 12px 20px;
      letter-spacing: .12em;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .cover-actions button:hover,
    .chapter-actions button:hover,
    .today-card button:hover {
      transform: translateY(-2px);
      border-color: rgba(255,170,120,.7);
      background: rgba(255,139,95,.14);
    }

    .page .chapter-actions button {
      color: currentColor;
      border-color: color-mix(in srgb, currentColor 22%, transparent);
      background: color-mix(in srgb, currentColor 6%, transparent);
    }

    .page .chapter-actions button:hover {
      border-color: var(--ember);
      background: rgba(162,77,50,.1);
    }

    .contents {
      align-content: center;
      padding: clamp(28px, 6vw, 80px);
      background: rgba(5,7,10,.46);
      color: var(--cream);
    }

    .contents-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(280px, .78fr) minmax(420px, 1.22fr);
      gap: clamp(34px, 6vw, 82px);
      align-items: center;
    }

    .contents h2 {
      margin: 16px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(48px, 8vw, 108px);
      line-height: 1;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .today-card {
      margin-top: 34px;
      padding: 22px;
      border: 1px solid rgba(244,237,223,.18);
      background: rgba(5,7,10,.34);
      backdrop-filter: blur(12px);
    }

    .recent-card {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid rgba(244,237,223,.14);
      background: rgba(244,237,223,.055);
    }

    .recent-card h3 {
      margin: 0 0 12px;
      color: rgba(244,237,223,.82);
      font-size: 16px;
      letter-spacing: .12em;
    }

    .recent-card p {
      margin: 6px 0;
      color: rgba(244,237,223,.58);
      line-height: 1.75;
      font-size: 13px;
    }

    .today-card h3 {
      margin: 0 0 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .today-card p {
      margin: 8px 0;
      color: rgba(244,237,223,.72);
      line-height: 1.75;
    }

    .chapter-list {
      display: grid;
      gap: 10px;
      max-height: 76vh;
      overflow: auto;
      padding-right: 8px;
    }

    .chapter-link {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 18px;
      align-items: center;
      border: 0;
      border-bottom: 1px solid rgba(244,237,223,.16);
      background: transparent;
      padding: 18px 0;
      color: var(--cream);
      text-align: left;
    }

    .chapter-link:hover .chapter-title {
      color: #ffd0a7;
    }

    .chapter-number {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: .22em;
    }

    .chapter-title {
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(24px, 3vw, 42px);
      letter-spacing: .08em;
      transition: color .2s ease;
    }

    .chapter-desc {
      color: rgba(244,237,223,.55);
      font-size: 13px;
      line-height: 1.7;
    }

    .chapter {
      place-items: center;
      padding: clamp(22px, 5vw, 70px);
      background:
        linear-gradient(90deg, rgba(5,7,10,.2), rgba(5,7,10,.74)),
        var(--chapter-bg, var(--paper));
    }

    .page {
      width: min(980px, 100%);
      max-height: min(760px, calc(100vh - 44px));
      overflow: auto;
      padding: clamp(34px, 6vw, 76px);
      background: var(--page-bg, rgba(244,237,223,.96));
      color: var(--page-text, var(--text));
      box-shadow: 0 38px 130px rgba(0,0,0,.42);
      border: 1px solid rgba(0,0,0,.08);
    }

    .chapter[data-tone="note"] .page {
      --page-bg: #f7f0df;
    }

    .chapter[data-tone="photo"] .page {
      --page-bg: rgba(5,7,10,.82);
      --page-text: var(--cream);
      border-color: rgba(244,237,223,.16);
    }

    .chapter[data-tone="archive"] .page {
      --page-bg: #eee5d4;
    }

    .chapter[data-tone="profile"] .page {
      --page-bg: linear-gradient(135deg, #efe2ce, #f8f1e4);
    }

    .chapter[data-tone="project"] .page {
      --page-bg: #101820;
      --page-text: var(--cream);
      border-color: rgba(244,237,223,.16);
    }

    .chapter[data-tone="timeline"] .page {
      --page-bg: #e8dfcf;
      background-image: radial-gradient(circle at 20% 20%, rgba(162,77,50,.1), transparent 28%);
    }

    .chapter[data-tone="library"] .page {
      --page-bg: #efe6d0;
      background-image:
        linear-gradient(90deg, rgba(29,26,21,.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(29,26,21,.05) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .chapter[data-tone="journal"] .page {
      --page-bg: #f6efdf;
      background-image: linear-gradient(rgba(29,26,21,.08) 1px, transparent 1px);
      background-size: 100% 34px;
    }

    .chapter[data-tone="letter"] .page {
      --page-bg: #f8f0e3;
      border-radius: 2px;
    }

    .chapter[data-tone="preface"] {
      background:
        linear-gradient(90deg, rgba(5,7,10,.24), rgba(5,7,10,.68)),
        radial-gradient(circle at 20% 18%, rgba(255, 208, 167, .18), transparent 34%),
        #1b1712;
    }

    .chapter[data-tone="preface"] .page {
      --page-bg: #f7efe0;
      width: min(900px, 100%);
      border-radius: 2px;
      background:
        linear-gradient(90deg, rgba(29,26,21,.035), transparent 12%, transparent 88%, rgba(29,26,21,.04)),
        linear-gradient(180deg, rgba(255,255,255,.38), transparent 34%),
        #f7efe0;
      box-shadow:
        inset 22px 0 34px rgba(29,26,21,.035),
        0 42px 140px rgba(0,0,0,.48);
    }

    .chapter-label {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .32em;
      text-transform: uppercase;
    }

    .page h2 {
      margin: 16px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(42px, 7vw, 92px);
      line-height: 1;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .page p {
      color: color-mix(in srgb, currentColor 72%, transparent);
      font-size: 16px;
      line-height: 2;
    }

    .preface-hero {
      min-height: 34vh;
      display: grid;
      align-content: end;
      padding-bottom: clamp(26px, 4vw, 46px);
      border-bottom: 1px solid rgba(29,26,21,.14);
    }

    .preface-lede {
      width: min(680px, 100%);
      margin-top: 28px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      color: #17130f;
      font-size: clamp(25px, 3.5vw, 42px);
      line-height: 1.65;
      letter-spacing: .08em;
    }

    .chapter-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 28px 0 42px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(29,26,21,.12);
      color: rgba(29,26,21,.62);
      font-size: 12px;
      letter-spacing: .12em;
    }

    .chapter-meta span {
      display: block;
      color: #221a13;
      margin-top: 6px;
      font-size: 13px;
      letter-spacing: .04em;
    }

    .preface-section {
      width: min(720px, 100%);
      margin: 0 auto 42px;
    }

    .preface-section h3,
    .future-letter h3 {
      margin: 0 0 12px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 400;
      letter-spacing: .08em;
    }

    .growth-line {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      width: min(760px, 100%);
      margin: 46px auto;
      border-top: 1px solid rgba(29,26,21,.18);
    }

    .growth-line div {
      position: relative;
      padding: 22px 16px 0 0;
    }

    .growth-line div::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 0;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--ember);
    }

    .growth-line strong {
      display: block;
      margin-bottom: 8px;
      font-family: "Times New Roman", Georgia, serif;
      color: var(--ember);
      letter-spacing: .12em;
    }

    .growth-line span {
      color: rgba(29,26,21,.62);
      font-size: 13px;
      line-height: 1.7;
    }

    .future-letter {
      width: min(720px, 100%);
      margin: 50px auto 0;
      padding: clamp(22px, 4vw, 38px);
      border-left: 3px solid var(--ember);
      background: rgba(255,255,255,.3);
    }

    .page-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 34px;
    }

    .card {
      padding: 20px;
      border: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      background: color-mix(in srgb, currentColor 5%, transparent);
    }

    .card h3 {
      margin: 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 26px;
      font-weight: 400;
    }

    .timeline {
      display: grid;
      gap: 22px;
      margin-top: 34px;
    }

    .moment {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 22px;
      border-top: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      padding-top: 18px;
    }

    .year {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 24px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      grid-auto-rows: 160px;
      gap: 12px;
      margin-top: 34px;
    }

    .page-quote {
      margin-top: 34px;
      padding-left: 22px;
      border-left: 2px solid var(--ember);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.6;
    }

    .transition {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: none;
      place-items: center;
      background: rgba(5,7,10,.88);
      color: var(--cream);
      backdrop-filter: blur(18px);
    }

    .transition.is-active {
      display: grid;
      animation: fadeChapter 1s ease both;
    }

    .transition-card {
      text-align: center;
    }

    .transition-card small {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: .34em;
      text-transform: uppercase;
    }

    .transition-card strong {
      display: block;
      margin-top: 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(40px, 7vw, 96px);
      font-weight: 400;
      letter-spacing: .1em;
    }

    @keyframes fadeChapter {
      0% { opacity: 0; }
      18%, 72% { opacity: 1; }
      100% { opacity: 0; }
    }

    .photo {
      display: grid;
      align-content: end;
      padding: 18px;
      background:
        linear-gradient(180deg, transparent, rgba(0,0,0,.68)),
        url("assets/wenchang-sunset.png") center / cover;
      color: var(--cream);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 24px;
      letter-spacing: .08em;
      min-height: 140px;
    }

    .photo:first-child {
      grid-row: span 2;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .book {
        min-height: 100svh;
      }

      .view {
        position: relative;
        min-height: 100svh;
        display: none;
      }

      .view.is-active {
        display: grid;
      }

      .contents-inner,
      .page-grid,
      .moment,
      .photo-grid,
      .chapter-meta,
      .growth-line {
        grid-template-columns: 1fr;
      }

      .preface-hero {
        min-height: 24vh;
      }

      .growth-line {
        border-top: 0;
        border-left: 1px solid rgba(29,26,21,.18);
        margin-left: 5px;
      }

      .growth-line div {
        padding: 0 0 24px 22px;
      }

      .growth-line div::before {
        top: 4px;
        left: -5px;
      }

      .chapter-link {
        grid-template-columns: 54px 1fr;
      }

      .chapter-desc {
        grid-column: 2;
      }

      .page {
        max-height: none;
      }

      .photo:first-child {
        grid-row: span 1;
      }
    }
  </style>
</head>
<body>
  <main class="book">
    <button class="menu-button" id="menuButton" type="button" aria-label="打开目录">☰</button>
    <div class="reader-tools">
      <div class="progress-pill" id="progressPill">0%</div>
      <button class="tool-button" id="searchButton" type="button" aria-label="搜索">⌕</button>
      <button class="tool-button" id="addButton" type="button" aria-label="添加内容">＋</button>
    </div>

    <section class="view cover is-active" id="cover">
      <div class="cover-panel">
        <div class="kicker">A book still being written</div>
        <div class="roman-name"><span>Han</span><span>Pengfei</span></div>
        <div class="cover-line"></div>
        <h1>《韩鹏飞》</h1>
        <div class="cover-subtitle">一本仍在书写中的人生。</div>
        <div class="cover-actions">
          <button type="button" data-go="contents">翻开第一页</button>
          <button type="button" id="randomFromCover">随机读一页</button>
        </div>
      </div>
    </section>

    <section class="view contents" id="contents">
      <div class="contents-inner">
        <div>
          <div class="kicker">Table of Contents</div>
          <h2>目录</h2>
          <div class="today-card">
            <h3>今天的我</h3>

    const views = document.querySelectorAll(".view");
    const page = document.getElementById("page");
    const chapterView = document.getElementById("chapterView");
    const menu = document.getElementById("menu");
    const transition = document.getElementById("transition");
    const transitionNumber = document.getElementById("transitionNumber");
    const transitionTitle = document.getElementById("transitionTitle");
    const progressPill = document.getElementById("progressPill");
    const searchPanel = document.getElementById("searchPanel");
    const addPanel = document.getElementById("addPanel");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    const chapterKeys = [
      "why-record",
      "about",
      "timeline",
      "projects",
      "thoughts",
      "reading",
      "photos",
      "ideas",
      "failures",
      "journal",
      "future",
      "contact"
    ];
    let currentChapterKey = chapterKeys[0];

    function showView(id) {
      views.forEach((view) => view.classList.toggle("is-active", view.id === id));
      menu.classList.remove("is-open");
      searchPanel.classList.remove("is-open");
      addPanel.classList.remove("is-open");
      if (id === "cover") {
        progressPill.textContent = "0%";
        history.replaceState(null, "", "#cover");
      }
      if (id === "contents") {
        progressPill.textContent = "目录";
        history.replaceState(null, "", "#contents");
      }
    }

    function openChapter(key) {
      const chapter = chapters[key];
      if (!chapter) return;
      currentChapterKey = key;
      const index = chapterKeys.indexOf(key);
      const progress = Math.round(((index + 1) / chapterKeys.length) * 100);
      const previousKey = chapterKeys[(index - 1 + chapterKeys.length) % chapterKeys.length];
      const nextKey = chapterKeys[(index + 1) % chapterKeys.length];
      const previousTitle = chapters[previousKey].title;
      const nextTitle = chapters[nextKey].title;
      transitionNumber.textContent = `Chapter ${chapter.number}`;
      transitionTitle.textContent = chapter.title;
      transition.classList.remove("is-active");
      void transition.offsetWidth;
      transition.classList.add("is-active");
      window.setTimeout(() => {
        chapterView.dataset.tone = chapter.tone;
        progressPill.textContent = `${progress}%`;
        page.innerHTML = chapter.html + `
          <div class="chapter-actions">
            <button type="button" data-chapter="${previousKey}">← 上一页：${previousTitle}</button>
            <button type="button" data-go="contents">回到目录</button>
            <button type="button" data-chapter="${nextKey}">下一页：${nextTitle} →</button>
          </div>
        `;
        showView("chapterView");
        history.replaceState(null, "", `#chapter/${key}`);
      }, 360);
      window.setTimeout(() => transition.classList.remove("is-active"), 980);
    }

    function randomChapter() {
      const key = chapterKeys[Math.floor(Math.random() * chapterKeys.length)];
      openChapter(key);
    }

    document.addEventListener("click", (event) => {
      const go = event.target.closest("[data-go]");
      if (go) showView(go.dataset.go);

      const chapter = event.target.closest("[data-chapter]");
      if (chapter) openChapter(chapter.dataset.chapter);

      if (event.target.closest("[data-random]")) randomChapter();
    });

    document.getElementById("menuButton").addEventListener("click", () => {
      menu.classList.add("is-open");
    });

    document.getElementById("randomFromCover").addEventListener("click", randomChapter);
    document.getElementById("randomFromContents").addEventListener("click", randomChapter);

    document.getElementById("searchButton").addEventListener("click", () => {
      addPanel.classList.remove("is-open");
      searchPanel.classList.toggle("is-open");
      searchInput.focus();
    });

    document.getElementById("addButton").addEventListener("click", () => {
      searchPanel.classList.remove("is-open");
      addPanel.classList.toggle("is-open");
    });

    function renderSearch(query = "") {
      const normalized = query.trim().toLowerCase();
      searchResults.innerHTML = "";
      chapterKeys
        .filter((key) => {
          const chapter = chapters[key];
          return !normalized || `${chapter.title} ${chapter.html}`.toLowerCase().includes(normalized);
        })
        .forEach((key) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = `${chapters[key].number}. ${chapters[key].title}`;
          button.addEventListener("click", () => openChapter(key));
          searchResults.appendChild(button);
        });
    }

    searchInput.addEventListener("input", () => renderSearch(searchInput.value));
    renderSearch();

    function restoreFromHash() {
      const hash = decodeURIComponent(location.hash || "");
      if (hash.startsWith("#chapter/")) {
        openChapter(hash.replace("#chapter/", ""));
      } else if (hash === "#contents") {
        showView("contents");
      } else {
        showView("cover");
      }
    }

    window.addEventListener("hashchange", restoreFromHash);
    restoreFromHash();

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (menu.classList.contains("is-open")) menu.classList.remove("is-open");
        else showView("contents");
      }
      if (!document.getElementById("chapterView").classList.contains("is-active")) return;
      const index = chapterKeys.indexOf(currentChapterKey);
      if (event.key === "ArrowLeft") {
        openChapter(chapterKeys[(index - 1 + chapterKeys.length) % chapterKeys.length]);
      }
      if (event.key === "ArrowRight") {
        openChapter(chapterKeys[(index + 1) % chapterKeys.length]);
      }
    });
  </script>
