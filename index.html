<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《韩鹏飞》一本仍在书写中的书</title>
  <style>
    :root {
      color-scheme: light dark;
      --ink: #12100d;
      --paper: #f4eddf;
      --paper-2: #ebe0ce;
      --text: #1d1a15;
      --muted: rgba(29, 26, 21, .64);
      --line: rgba(29, 26, 21, .16);
      --ember: #a24d32;
      --sea: #577c84;
      --night: #05070a;
      --cream: rgba(244, 237, 223, .94);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--night);
      color: var(--text);
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      overflow: hidden;
    }

    button {
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .book {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      background:
        linear-gradient(90deg, rgba(5,7,10,.72), rgba(5,7,10,.1) 46%, rgba(5,7,10,.7)),
        linear-gradient(180deg, rgba(5,7,10,.12), rgba(5,7,10,.76)),
        url("assets/wenchang-sunset.png") center / cover;
    }

    .book::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 4px),
        radial-gradient(circle at 50% 52%, transparent 0 48%, rgba(0,0,0,.38) 100%);
      opacity: .58;
    }

    .menu-button {
      position: fixed;
      z-index: 30;
      top: 28px;
      left: 28px;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(244,237,223,.28);
      background: rgba(5,7,10,.28);
      color: var(--cream);
      backdrop-filter: blur(14px);
      font-size: 24px;
      line-height: 1;
    }

    .menu {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(5,7,10,.72);
      backdrop-filter: blur(18px);
      color: var(--cream);
      padding: clamp(38px, 7vw, 90px);
    }

    .menu.is-open {
      display: grid;
      align-content: center;
    }

    .menu-grid {
      width: min(760px, 100%);
      display: grid;
      gap: 8px;
      margin: 0 auto;
    }

    .menu-title {
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(244,237,223,.2);
      color: rgba(244,237,223,.58);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .36em;
      text-transform: uppercase;
    }

    .menu-grid button {
      border: 0;
      border-bottom: 1px solid rgba(244,237,223,.16);
      background: transparent;
      padding: 16px 0;
      text-align: left;
      color: var(--cream);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(22px, 3vw, 36px);
      letter-spacing: .08em;
    }

    .menu-grid small {
      display: block;
      margin-top: 6px;
      color: rgba(244,237,223,.42);
      font-family: "Microsoft YaHei UI", sans-serif;
      font-size: 12px;
      letter-spacing: .12em;
    }

    .menu-grid button:hover {
      color: #ffd0a7;
    }

    .view {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      opacity: 0;
      visibility: hidden;
      transform: translateY(16px);
      transition: opacity .5s ease, transform .5s ease, visibility .5s;
    }

    .view.is-active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .cover {
      place-items: center;
      padding: 28px;
      color: var(--cream);
      text-align: center;
    }

    .cover-panel {
      width: min(980px, 100%);
      padding: clamp(38px, 8vw, 96px);
      border: 1px solid rgba(244,237,223,.18);
      background: linear-gradient(180deg, rgba(5,7,10,.26), rgba(5,7,10,.52));
      backdrop-filter: blur(8px);
      box-shadow: 0 40px 140px rgba(0,0,0,.38);
    }

    .roman-name {
      display: grid;
      gap: 2px;
      margin-top: 26px;
      color: rgba(244,237,223,.82);
      font-family: "Times New Roman", Georgia, serif;
      font-size: clamp(36px, 7vw, 92px);
      line-height: .88;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .kicker {
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .34em;
      text-transform: uppercase;
      color: rgba(244,237,223,.74);
    }

    h1 {
      margin: 28px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(42px, 7vw, 92px);
      line-height: .92;
      font-weight: 400;
      letter-spacing: .1em;
      text-shadow: 0 18px 46px rgba(0,0,0,.55);
    }

    .cover-subtitle {
      margin-top: 24px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(18px, 2vw, 28px);
      letter-spacing: .16em;
      color: rgba(244,237,223,.86);
    }

    .cover-line {
      width: min(360px, 70%);
      height: 1px;
      margin: 30px auto 0;
      background: linear-gradient(90deg, transparent, rgba(244,237,223,.58), transparent);
    }

    .cover-actions,
    .chapter-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 42px;
    }

    .cover-actions button,
    .chapter-actions button,
    .today-card button {
      border: 1px solid rgba(244,237,223,.28);
      background: rgba(244,237,223,.08);
      color: var(--cream);
      padding: 12px 20px;
      letter-spacing: .12em;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .cover-actions button:hover,
    .chapter-actions button:hover,
    .today-card button:hover {
      transform: translateY(-2px);
      border-color: rgba(255,170,120,.7);
      background: rgba(255,139,95,.14);
    }

    .contents {
      align-content: center;
      padding: clamp(28px, 6vw, 80px);
      background: rgba(5,7,10,.46);
      color: var(--cream);
    }

    .contents-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(280px, .78fr) minmax(420px, 1.22fr);
      gap: clamp(34px, 6vw, 82px);
      align-items: center;
    }

    .contents h2 {
      margin: 16px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(48px, 8vw, 108px);
      line-height: 1;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .today-card {
      margin-top: 34px;
      padding: 22px;
      border: 1px solid rgba(244,237,223,.18);
      background: rgba(5,7,10,.34);
      backdrop-filter: blur(12px);
    }

    .recent-card {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid rgba(244,237,223,.14);
      background: rgba(244,237,223,.055);
    }

    .recent-card h3 {
      margin: 0 0 12px;
      color: rgba(244,237,223,.82);
      font-size: 16px;
      letter-spacing: .12em;
    }

    .recent-card p {
      margin: 6px 0;
      color: rgba(244,237,223,.58);
      line-height: 1.75;
      font-size: 13px;
    }

    .today-card h3 {
      margin: 0 0 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .today-card p {
      margin: 8px 0;
      color: rgba(244,237,223,.72);
      line-height: 1.75;
    }

    .chapter-list {
      display: grid;
      gap: 10px;
      max-height: 76vh;
      overflow: auto;
      padding-right: 8px;
    }

    .chapter-link {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 18px;
      align-items: center;
      border: 0;
      border-bottom: 1px solid rgba(244,237,223,.16);
      background: transparent;
      padding: 18px 0;
      color: var(--cream);
      text-align: left;
    }

    .chapter-link:hover .chapter-title {
      color: #ffd0a7;
    }

    .chapter-number {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: .22em;
    }

    .chapter-title {
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(24px, 3vw, 42px);
      letter-spacing: .08em;
      transition: color .2s ease;
    }

    .chapter-desc {
      color: rgba(244,237,223,.55);
      font-size: 13px;
      line-height: 1.7;
    }

    .chapter {
      place-items: center;
      padding: clamp(22px, 5vw, 70px);
      background:
        linear-gradient(90deg, rgba(5,7,10,.2), rgba(5,7,10,.74)),
        var(--chapter-bg, var(--paper));
    }

    .page {
      width: min(980px, 100%);
      max-height: min(760px, calc(100vh - 44px));
      overflow: auto;
      padding: clamp(34px, 6vw, 76px);
      background: var(--page-bg, rgba(244,237,223,.96));
      color: var(--page-text, var(--text));
      box-shadow: 0 38px 130px rgba(0,0,0,.42);
      border: 1px solid rgba(0,0,0,.08);
    }

    .chapter[data-tone="note"] .page {
      --page-bg: #f7f0df;
    }

    .chapter[data-tone="photo"] .page {
      --page-bg: rgba(5,7,10,.82);
      --page-text: var(--cream);
      border-color: rgba(244,237,223,.16);
    }

    .chapter[data-tone="archive"] .page {
      --page-bg: #eee5d4;
    }

    .chapter[data-tone="profile"] .page {
      --page-bg: linear-gradient(135deg, #efe2ce, #f8f1e4);
    }

    .chapter[data-tone="project"] .page {
      --page-bg: #101820;
      --page-text: var(--cream);
      border-color: rgba(244,237,223,.16);
    }

    .chapter[data-tone="timeline"] .page {
      --page-bg: #e8dfcf;
      background-image: radial-gradient(circle at 20% 20%, rgba(162,77,50,.1), transparent 28%);
    }

    .chapter-label {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .32em;
      text-transform: uppercase;
    }

    .page h2 {
      margin: 16px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(42px, 7vw, 92px);
      line-height: 1;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .page p {
      color: color-mix(in srgb, currentColor 72%, transparent);
      font-size: 16px;
      line-height: 2;
    }

    .page-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 34px;
    }

    .card {
      padding: 20px;
      border: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      background: color-mix(in srgb, currentColor 5%, transparent);
    }

    .card h3 {
      margin: 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 26px;
      font-weight: 400;
    }

    .timeline {
      display: grid;
      gap: 22px;
      margin-top: 34px;
    }

    .moment {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 22px;
      border-top: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      padding-top: 18px;
    }

    .year {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 24px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      grid-auto-rows: 160px;
      gap: 12px;
      margin-top: 34px;
    }

    .page-quote {
      margin-top: 34px;
      padding-left: 22px;
      border-left: 2px solid var(--ember);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.6;
    }

    .transition {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: none;
      place-items: center;
      background: rgba(5,7,10,.88);
      color: var(--cream);
      backdrop-filter: blur(18px);
    }

    .transition.is-active {
      display: grid;
      animation: fadeChapter 1s ease both;
    }

    .transition-card {
      text-align: center;
    }

    .transition-card small {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: .34em;
      text-transform: uppercase;
    }

    .transition-card strong {
      display: block;
      margin-top: 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(40px, 7vw, 96px);
      font-weight: 400;
      letter-spacing: .1em;
    }

    @keyframes fadeChapter {
      0% { opacity: 0; }
      18%, 72% { opacity: 1; }
      100% { opacity: 0; }
    }

    .photo {
      display: grid;
      align-content: end;
      padding: 18px;
      background:
        linear-gradient(180deg, transparent, rgba(0,0,0,.68)),
        url("assets/wenchang-sunset.png") center / cover;
      color: var(--cream);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 24px;
      letter-spacing: .08em;
      min-height: 140px;
    }

    .photo:first-child {
      grid-row: span 2;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .book {
        min-height: 100svh;
      }

      .view {
        position: relative;
        min-height: 100svh;
        display: none;
      }

      .view.is-active {
        display: grid;
      }

      .contents-inner,
      .page-grid,
      .moment,
      .photo-grid {
        grid-template-columns: 1fr;
      }

      .chapter-link {
        grid-template-columns: 54px 1fr;
      }

      .chapter-desc {
        grid-column: 2;
      }

      .page {
        max-height: none;
      }

      .photo:first-child {
        grid-row: span 1;
      }
    }
  </style>
</head>
<body>
  <main class="book">
    <button class="menu-button" id="menuButton" type="button" aria-label="打开目录">☰</button>

    <section class="view cover is-active" id="cover">
      <div class="cover-panel">
        <div class="kicker">A book still being written</div>
        <div class="roman-name"><span>Han</span><span>Pengfei</span></div>
        <div class="cover-line"></div>
        <h1>《韩鹏飞》</h1>
        <div class="cover-subtitle">一本仍在书写中的人生。</div>
        <div class="cover-actions">
          <button type="button" data-go="contents">翻开第一页</button>
          <button type="button" id="randomFromCover">随机读一页</button>
        </div>
      </div>
    </section>

    <section class="view contents" id="contents">
      <div class="contents-inner">
        <div>
          <div class="kicker">Table of Contents</div>
          <h2>目录</h2>
          <div class="today-card">
            <h3>今天的我</h3>
            <p>2026.7.17</p>
            <p>最近在做：把个人主页改成一本能翻阅的书。</p>
            <p>最近在想：留下经历，比展示能力更重要。</p>
            <button type="button" id="randomFromContents">今天，随机读一页</button>
          </div>
          <div class="recent-card">
            <h3>最近更新</h3>
            <p>重构为 Digital Life Book。</p>
            <p>加入章节翻页、目录、随机阅读与隐藏菜单。</p>
          </div>
        </div>

        <div class="chapter-list" id="chapterList">
          <button class="chapter-link" type="button" data-chapter="about">
            <span class="chapter-number">01</span>
            <span class="chapter-title">关于我</span>
            <span class="chapter-desc">不是简历，而是一个人的来处。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="timeline">
            <span class="chapter-number">02</span>
            <span class="chapter-title">时间轴</span>
            <span class="chapter-desc">一路走来的故事。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="projects">
            <span class="chapter-number">03</span>
            <span class="chapter-title">项目</span>
            <span class="chapter-desc">创造过什么，也推翻过什么。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="thoughts">
            <span class="chapter-number">04</span>
            <span class="chapter-title">思考</span>
            <span class="chapter-desc">世界观、判断和那些为什么。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="ideas">
            <span class="chapter-number">05</span>
            <span class="chapter-title">想法仓库</span>
            <span class="chapter-desc">还没有成形的灵感。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="failures">
            <span class="chapter-number">06</span>
            <span class="chapter-title">失败记录</span>
            <span class="chapter-desc">真实的尝试和推翻。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="photos">
            <span class="chapter-number">07</span>
            <span class="chapter-title">照片</span>
            <span class="chapter-desc">生活留下来的光。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="future">
            <span class="chapter-number">08</span>
            <span class="chapter-title">给未来的信</span>
            <span class="chapter-desc">写给几年后的自己。</span>
          </button>
        </div>
      </div>
    </section>

    <section class="view chapter" id="chapterView" data-tone="archive">
      <article class="page" id="page"></article>
    </section>

    <aside class="menu" id="menu">
      <div class="menu-grid">
        <div class="menu-title">Contents</div>
        <button type="button" data-go="cover">封面<small>Cover</small></button>
        <button type="button" data-go="contents">目录<small>Table of Contents</small></button>
        <button type="button" data-chapter="about">第一页 · 关于我<small>人物档案</small></button>
        <button type="button" data-chapter="timeline">第二章 · 时间轴<small>成长年轮</small></button>
        <button type="button" data-chapter="projects">第三章 · 项目<small>作品展</small></button>
        <button type="button" data-chapter="thoughts">第四章 · 思考<small>笔记本</small></button>
        <button type="button" data-chapter="photos">第七章 · 照片<small>摄影集</small></button>
      </div>
    </aside>

    <div class="transition" id="transition">
      <div class="transition-card">
        <small id="transitionNumber"></small>
        <strong id="transitionTitle"></strong>
      </div>
    </div>
  </main>

  <script>
    const chapters = {
      about: {
        number: "01",
        title: "关于我",
        tone: "profile",
        html: `
          <div class="chapter-label">Chapter 01</div>
          <h2>关于我</h2>
          <p>我是韩鹏飞，一个来自海南文昌的大学生。乐于接触新鲜事物，乐观开朗，积极向上，热爱篮球，也喜欢看着好看的风景发呆。</p>
          <div class="page-quote">不是简历，而是一个人的来处。</div>
          <div class="page-grid">
            <div class="card"><h3>来处</h3><p>文昌的海风、晚霞和椰影，是这本书的第一层底色。</p></div>
            <div class="card"><h3>性格</h3><p>我喜欢把复杂的问题拆开，保持好奇，然后一点点做出能被看见的东西。</p></div>
            <div class="card"><h3>生活</h3><p>篮球让我保持热烈，风景让我保持松弛。</p></div>
            <div class="card"><h3>方向</h3><p>我希望留下真正有价值的软件、记录和思考。</p></div>
          </div>
        `
      },
      timeline: {
        number: "02",
        title: "时间轴",
        tone: "timeline",
        html: `
          <div class="chapter-label">Chapter 02</div>
          <h2>时间轴</h2>
          <p>你不是突然出现的，而是一路成长过来的。</p>
          <div class="timeline">
            <div class="moment"><div class="year">2023</div><div><h3>开始认真记录自己的方向</h3><p>意识到经历如果不被记录，就会很快变模糊。</p></div></div>
            <div class="moment"><div class="year">2026</div><div><h3>开始搭建个人博物馆</h3><p>不只为了展示给别人看，也为了让未来的自己能回来翻阅。</p></div></div>
          </div>
        `
      },
      projects: {
        number: "03",
        title: "项目",
        tone: "project",
        html: `
          <div class="chapter-label">Chapter 03</div>
          <h2>项目</h2>
          <p>项目不只是结果，也是问题、选择、推翻和重新开始的过程。</p>
          <div class="page-grid">
            <div class="card"><h3>个人博物馆网站</h3><p>从一个炫酷主页，转向一个能长期记录自己的数字花园。</p></div>
            <div class="card"><h3>未来项目</h3><p>这里会继续记录课程作品、AI 实验、工具开发和真正想长期维护的东西。</p></div>
          </div>
        `
      },
      thoughts: {
        number: "04",
        title: "思考",
        tone: "note",
        html: `
          <div class="chapter-label">Chapter 04</div>
          <h2>思考</h2>
          <p>我为什么做一件事，如何看待一个问题，以及那些还没有完全成形的判断。</p>
          <div class="card"><h3>为什么要做这个网站</h3><p>不是为了炫耀，而是为了给经历一个容器。几年以后再回来，我希望还能看见现在的自己。</p></div>
        `
      },
      ideas: {
        number: "05",
        title: "想法仓库",
        tone: "note",
        html: `
          <div class="chapter-label">Chapter 05</div>
          <h2>想法仓库</h2>
          <p>一些突然出现、暂时还没有归宿的想法。它们也许会变成项目，也许只是提醒我曾经这样想过。</p>
          <div class="card"><h3>AI Agent 与个人记录</h3><p>如果 AI 能帮助整理经历、提炼思考、连接项目，个人网站会不会变成一个真正会生长的系统？</p></div>
        `
      },
      failures: {
        number: "06",
        title: "失败记录",
        tone: "archive",
        html: `
          <div class="chapter-label">Chapter 06</div>
          <h2>失败记录</h2>
          <p>失败不是污点。它们是判断力变清楚之前，必须留下的痕迹。</p>
          <div class="card"><h3>第一个版本太像展示页</h3><p>我发现自己真正想要的不是炫酷，而是能长期保存经历、思考和心境的空间。</p></div>
        `
      },
      photos: {
        number: "07",
        title: "照片",
        tone: "photo",
        html: `
          <div class="chapter-label">Chapter 07</div>
          <h2>照片</h2>
          <p>风景、篮球、日常和安静的时刻。它们不解释我，但会让别人更接近我。</p>
          <div class="photo-grid">
            <div class="photo">文昌晚霞</div>
            <div class="photo">椰影</div>
            <div class="photo">篮球</div>
            <div class="photo">风景</div>
            <div class="photo">日常</div>
          </div>
        `
      },
      future: {
        number: "08",
        title: "给未来的信",
        tone: "note",
        html: `
          <div class="chapter-label">Chapter 08</div>
          <h2>给未来的信</h2>
          <p>2026.7</p>
          <p>如果三年后的你看到这里，希望你还没有忘记为什么开始。希望你已经做出一些真正有价值的东西。如果失败了也没关系，但不要停止记录，不要停止思考。</p>
        `
      }
    };

    const views = document.querySelectorAll(".view");
    const page = document.getElementById("page");
    const chapterView = document.getElementById("chapterView");
    const menu = document.getElementById("menu");
    const transition = document.getElementById("transition");
    const transitionNumber = document.getElementById("transitionNumber");
    const transitionTitle = document.getElementById("transitionTitle");
    const chapterKeys = Object.keys(chapters);
    let currentChapterKey = chapterKeys[0];

    function showView(id) {
      views.forEach((view) => view.classList.toggle("is-active", view.id === id));
      menu.classList.remove("is-open");
    }

    function openChapter(key) {
      const chapter = chapters[key];
      if (!chapter) return;
      currentChapterKey = key;
      const index = chapterKeys.indexOf(key);
      const previousKey = chapterKeys[(index - 1 + chapterKeys.length) % chapterKeys.length];
      const nextKey = chapterKeys[(index + 1) % chapterKeys.length];
      const previousTitle = chapters[previousKey].title;
      const nextTitle = chapters[nextKey].title;
      transitionNumber.textContent = `Chapter ${chapter.number}`;
      transitionTitle.textContent = chapter.title;
      transition.classList.remove("is-active");
      void transition.offsetWidth;
      transition.classList.add("is-active");
      window.setTimeout(() => {
        chapterView.dataset.tone = chapter.tone;
        page.innerHTML = chapter.html + `
          <div class="chapter-actions">
            <button type="button" data-chapter="${previousKey}">← 上一页：${previousTitle}</button>
            <button type="button" data-go="contents">回到目录</button>
            <button type="button" data-chapter="${nextKey}">下一页：${nextTitle} →</button>
          </div>
        `;
        showView("chapterView");
      }, 360);
      window.setTimeout(() => transition.classList.remove("is-active"), 980);
    }

    function randomChapter() {
      const key = chapterKeys[Math.floor(Math.random() * chapterKeys.length)];
      openChapter(key);
    }

    document.addEventListener("click", (event) => {
      const go = event.target.closest("[data-go]");
      if (go) showView(go.dataset.go);

      const chapter = event.target.closest("[data-chapter]");
      if (chapter) openChapter(chapter.dataset.chapter);

      if (event.target.closest("[data-random]")) randomChapter();
    });

    document.getElementById("menuButton").addEventListener("click", () => {
      menu.classList.add("is-open");
    });

    document.getElementById("randomFromCover").addEventListener("click", randomChapter);
    document.getElementById("randomFromContents").addEventListener("click", randomChapter);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (menu.classList.contains("is-open")) menu.classList.remove("is-open");
        else showView("contents");
      }
      if (!document.getElementById("chapterView").classList.contains("is-active")) return;
      const index = chapterKeys.indexOf(currentChapterKey);
      if (event.key === "ArrowLeft") {
        openChapter(chapterKeys[(index - 1 + chapterKeys.length) % chapterKeys.length]);
      }
      if (event.key === "ArrowRight") {
        openChapter(chapterKeys[(index + 1) % chapterKeys.length]);
      }
    });
  </script>
</body>
</html>
