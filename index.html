<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《韩鹏飞》一本仍在书写中的书</title>
  <style>
    :root {
      color-scheme: light dark;
      --ink: #12100d;
      --paper: #f4eddf;
      --paper-2: #ebe0ce;
      --text: #1d1a15;
      --muted: rgba(29, 26, 21, .64);
      --line: rgba(29, 26, 21, .16);
      --ember: #a24d32;
      --sea: #577c84;
      --night: #05070a;
      --cream: rgba(244, 237, 223, .94);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--night);
      color: var(--text);
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      overflow: hidden;
    }

    button {
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .book {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      background:
        linear-gradient(90deg, rgba(5,7,10,.72), rgba(5,7,10,.1) 46%, rgba(5,7,10,.7)),
        linear-gradient(180deg, rgba(5,7,10,.12), rgba(5,7,10,.76)),
        url("assets/wenchang-sunset.png") center / cover;
    }

    .book::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 4px),
        radial-gradient(circle at 50% 52%, transparent 0 48%, rgba(0,0,0,.38) 100%);
      opacity: .58;
    }

    .menu-button {
      position: fixed;
      z-index: 30;
      top: 28px;
      left: 28px;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(244,237,223,.28);
      background: rgba(5,7,10,.28);
      color: var(--cream);
      backdrop-filter: blur(14px);
      font-size: 24px;
      line-height: 1;
    }

    .reader-tools {
      position: fixed;
      z-index: 30;
      top: 28px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--cream);
    }

    .progress-pill,
    .tool-button {
      border: 1px solid rgba(244,237,223,.28);
      background: rgba(5,7,10,.28);
      color: var(--cream);
      backdrop-filter: blur(14px);
      min-height: 42px;
      padding: 0 14px;
      letter-spacing: .08em;
    }

    .tool-button {
      min-width: 42px;
      font-size: 18px;
    }

    .popover {
      position: fixed;
      z-index: 45;
      top: 82px;
      right: 28px;
      width: min(360px, calc(100vw - 44px));
      display: none;
      padding: 18px;
      border: 1px solid rgba(244,237,223,.18);
      background: rgba(5,7,10,.86);
      color: var(--cream);
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 90px rgba(0,0,0,.42);
    }

    .popover.is-open {
      display: block;
    }

    .popover h3 {
      margin: 0 0 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 24px;
      font-weight: 400;
    }

    .popover input {
      width: 100%;
      border: 1px solid rgba(244,237,223,.2);
      background: rgba(244,237,223,.08);
      color: var(--cream);
      padding: 10px;
      outline: none;
    }

    .result-list,
    .action-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .result-list button,
    .action-list button {
      border: 1px solid rgba(244,237,223,.14);
      background: rgba(244,237,223,.06);
      color: var(--cream);
      padding: 10px;
      text-align: left;
    }

    .editor-panel {
      position: fixed;
      z-index: 46;
      top: 50%;
      left: 50%;
      width: min(560px, calc(100vw - 44px));
      max-height: calc(100vh - 44px);
      overflow: auto;
      display: none;
      transform: translate(-50%, -50%);
      padding: 22px;
      border: 1px solid rgba(244,237,223,.2);
      background: rgba(5,7,10,.9);
      color: var(--cream);
      backdrop-filter: blur(20px);
      box-shadow: 0 34px 120px rgba(0,0,0,.52);
    }

    .editor-panel.is-open {
      display: block;
    }

    .editor-panel h3 {
      margin: 0 0 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .editor-panel label {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      color: rgba(244,237,223,.72);
      font-size: 13px;
      letter-spacing: .08em;
    }

    .editor-panel input,
    .editor-panel select,
    .editor-panel textarea {
      width: 100%;
      border: 1px solid rgba(244,237,223,.22);
      background: rgba(244,237,223,.08);
      color: var(--cream);
      padding: 11px;
      outline: none;
      font: inherit;
    }

    .editor-panel textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.8;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .editor-actions button {
      border: 1px solid rgba(244,237,223,.22);
      background: rgba(244,237,223,.08);
      color: var(--cream);
      padding: 10px 16px;
    }

    .editor-feedback {
      min-height: 22px;
      margin-top: 10px;
      color: #ffd0a7;
      font-size: 13px;
    }

    .menu {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(5,7,10,.72);
      backdrop-filter: blur(18px);
      color: var(--cream);
      padding: clamp(38px, 7vw, 90px);
    }

    .menu.is-open {
      display: grid;
      align-content: center;
    }

    .menu-grid {
      width: min(760px, 100%);
      display: grid;
      gap: 8px;
      margin: 0 auto;
    }

    .menu-title {
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(244,237,223,.2);
      color: rgba(244,237,223,.58);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .36em;
      text-transform: uppercase;
    }

    .menu-grid button {
      border: 0;
      border-bottom: 1px solid rgba(244,237,223,.16);
      background: transparent;
      padding: 16px 0;
      text-align: left;
      color: var(--cream);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(22px, 3vw, 36px);
      letter-spacing: .08em;
    }

    .menu-grid small {
      display: block;
      margin-top: 6px;
      color: rgba(244,237,223,.42);
      font-family: "Microsoft YaHei UI", sans-serif;
      font-size: 12px;
      letter-spacing: .12em;
    }

    .menu-grid button:hover {
      color: #ffd0a7;
    }

    .view {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      opacity: 0;
      visibility: hidden;
      transform: translateY(16px);
      transition: opacity .5s ease, transform .5s ease, visibility .5s;
    }

    .view.is-active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .cover {
      align-items: center;
      justify-items: center;
      padding: clamp(34px, 6vw, 86px);
      color: var(--cream);
      text-align: center;
    }

    .cover-panel {
      width: min(980px, 100%);
      padding: clamp(38px, 8vw, 96px);
      border: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      transform: translateY(-2vh);
    }

    .roman-name {
      display: grid;
      gap: 2px;
      margin-top: 26px;
      color: rgba(244,237,223,.82);
      font-family: "Times New Roman", Georgia, serif;
      font-size: clamp(36px, 7vw, 92px);
      line-height: .88;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .kicker {
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .34em;
      text-transform: uppercase;
      color: rgba(244,237,223,.74);
    }

    h1 {
      margin: 28px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(42px, 7vw, 92px);
      line-height: .92;
      font-weight: 400;
      letter-spacing: .1em;
      text-shadow: 0 18px 46px rgba(0,0,0,.55);
    }

    .cover-subtitle {
      margin-top: 24px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(18px, 2vw, 28px);
      letter-spacing: .16em;
      color: rgba(244,237,223,.86);
    }

    .cover-line {
      width: min(360px, 70%);
      height: 1px;
      margin: 30px auto 0;
      background: linear-gradient(90deg, transparent, rgba(244,237,223,.58), transparent);
    }

    .cover-actions,
    .chapter-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 42px;
    }

    .cover-actions button,
    .chapter-actions button,
    .today-card button {
      border: 1px solid rgba(244,237,223,.28);
      background: rgba(244,237,223,.08);
      color: var(--cream);
      padding: 12px 20px;
      letter-spacing: .12em;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .cover-actions button:hover,
    .chapter-actions button:hover,
    .today-card button:hover {
      transform: translateY(-2px);
      border-color: rgba(255,170,120,.7);
      background: rgba(255,139,95,.14);
    }

    .page .chapter-actions button {
      color: currentColor;
      border-color: color-mix(in srgb, currentColor 22%, transparent);
      background: color-mix(in srgb, currentColor 6%, transparent);
    }

    .page .chapter-actions button:hover {
      border-color: var(--ember);
      background: rgba(162,77,50,.1);
    }

    .contents {
      align-content: center;
      padding: clamp(28px, 6vw, 80px);
      background:
        linear-gradient(90deg, rgba(5,7,10,.72), rgba(5,7,10,.38) 40%, rgba(5,7,10,.82)),
        rgba(5,7,10,.46);
      color: var(--cream);
    }

    .contents-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(280px, .76fr) minmax(420px, 1.24fr);
      gap: clamp(34px, 6vw, 82px);
      align-items: center;
    }

    .contents-shelf {
      position: relative;
      padding-left: clamp(20px, 3vw, 34px);
    }

    .contents-shelf::before {
      content: "";
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(244,237,223,.38), transparent);
    }

    .contents h2 {
      margin: 16px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(48px, 8vw, 108px);
      line-height: 1;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .contents-note {
      width: min(360px, 100%);
      margin: 18px 0 0;
      color: rgba(244,237,223,.68);
      font-size: 15px;
      line-height: 1.9;
    }

    .today-card {
      margin-top: 34px;
      padding: 22px;
      border: 0;
      border-top: 1px solid rgba(244,237,223,.2);
      border-bottom: 1px solid rgba(244,237,223,.14);
      background: transparent;
      backdrop-filter: none;
    }

    .recent-card {
      margin-top: 18px;
      padding: 18px;
      border: 0;
      background: rgba(244,237,223,.06);
    }

    .recent-card h3 {
      margin: 0 0 12px;
      color: rgba(244,237,223,.82);
      font-size: 16px;
      letter-spacing: .12em;
    }

    .recent-card p {
      margin: 6px 0;
      color: rgba(244,237,223,.58);
      line-height: 1.75;
      font-size: 13px;
    }

    .today-card h3 {
      margin: 0 0 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .today-card p {
      margin: 8px 0;
      color: rgba(244,237,223,.72);
      line-height: 1.75;
    }

    .chapter-list {
      display: grid;
      gap: 0;
      max-height: 76vh;
      overflow: auto;
      padding: 10px 18px 10px 0;
      border-left: 1px solid rgba(244,237,223,.18);
    }

    .chapter-link {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 18px;
      align-items: center;
      border: 0;
      border-bottom: 1px solid rgba(244,237,223,.16);
      background: transparent;
      padding: 18px 0 18px 22px;
      color: var(--cream);
      text-align: left;
    }

    .chapter-link:first-child {
      border-top: 1px solid rgba(244,237,223,.16);
    }

    .chapter-link:hover {
      background: linear-gradient(90deg, rgba(244,237,223,.08), transparent);
    }

    .chapter-link:hover .chapter-title {
      color: #ffd0a7;
    }

    .chapter-number {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: .22em;
    }

    .chapter-title {
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(24px, 3vw, 42px);
      letter-spacing: .08em;
      transition: color .2s ease;
    }

    .chapter-desc {
      color: rgba(244,237,223,.55);
      font-size: 13px;
      line-height: 1.7;
    }

    .chapter {
      place-items: center;
      padding: clamp(22px, 5vw, 70px);
      background:
        linear-gradient(90deg, rgba(5,7,10,.2), rgba(5,7,10,.74)),
        var(--chapter-bg, var(--paper));
    }

    .page {
      width: min(980px, 100%);
      max-height: min(760px, calc(100vh - 44px));
      overflow: auto;
      padding: clamp(34px, 6vw, 76px);
      background: var(--page-bg, rgba(244,237,223,.96));
      color: var(--page-text, var(--text));
      box-shadow: 0 38px 130px rgba(0,0,0,.42);
      border: 1px solid rgba(0,0,0,.08);
    }

    .chapter[data-tone="note"] .page {
      --page-bg: #f7f0df;
    }

    .chapter[data-tone="photo"] .page {
      --page-bg: rgba(5,7,10,.82);
      --page-text: var(--cream);
      border-color: rgba(244,237,223,.16);
    }

    .chapter[data-tone="archive"] .page {
      --page-bg: #eee5d4;
    }

    .chapter[data-tone="profile"] .page {
      --page-bg: linear-gradient(135deg, #efe2ce, #f8f1e4);
    }

    .chapter[data-tone="project"] .page {
      --page-bg: #101820;
      --page-text: var(--cream);
      border-color: rgba(244,237,223,.16);
    }

    .chapter[data-tone="timeline"] .page {
      --page-bg: #e8dfcf;
      background-image: radial-gradient(circle at 20% 20%, rgba(162,77,50,.1), transparent 28%);
    }

    .chapter[data-tone="library"] .page {
      --page-bg: #efe6d0;
      background-image:
        linear-gradient(90deg, rgba(29,26,21,.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(29,26,21,.05) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .chapter[data-tone="journal"] .page {
      --page-bg: #f6efdf;
      background-image: linear-gradient(rgba(29,26,21,.08) 1px, transparent 1px);
      background-size: 100% 34px;
    }

    .chapter[data-tone="letter"] .page {
      --page-bg: #f8f0e3;
      border-radius: 2px;
    }

    .chapter[data-tone="preface"] {
      background:
        linear-gradient(90deg, rgba(5,7,10,.24), rgba(5,7,10,.68)),
        radial-gradient(circle at 20% 18%, rgba(255, 208, 167, .18), transparent 34%),
        #1b1712;
    }

    .chapter[data-tone="preface"] .page {
      --page-bg: #f7efe0;
      width: min(900px, 100%);
      border-radius: 2px;
      background:
        linear-gradient(90deg, rgba(29,26,21,.035), transparent 12%, transparent 88%, rgba(29,26,21,.04)),
        linear-gradient(180deg, rgba(255,255,255,.38), transparent 34%),
        #f7efe0;
      box-shadow:
        inset 22px 0 34px rgba(29,26,21,.035),
        0 42px 140px rgba(0,0,0,.48);
    }

    .chapter-label {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .32em;
      text-transform: uppercase;
    }

    .page h2 {
      margin: 16px 0 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(42px, 7vw, 92px);
      line-height: 1;
      font-weight: 400;
      letter-spacing: .08em;
    }

    .page p {
      color: color-mix(in srgb, currentColor 72%, transparent);
      font-size: 16px;
      line-height: 2;
    }

    .preface-hero {
      min-height: 34vh;
      display: grid;
      align-content: end;
      padding-bottom: clamp(26px, 4vw, 46px);
      border-bottom: 1px solid rgba(29,26,21,.14);
    }

    .preface-lede {
      width: min(680px, 100%);
      margin-top: 28px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      color: #17130f;
      font-size: clamp(25px, 3.5vw, 42px);
      line-height: 1.65;
      letter-spacing: .08em;
    }

    .chapter-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 28px 0 42px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(29,26,21,.12);
      color: rgba(29,26,21,.62);
      font-size: 12px;
      letter-spacing: .12em;
    }

    .chapter-meta span {
      display: block;
      color: #221a13;
      margin-top: 6px;
      font-size: 13px;
      letter-spacing: .04em;
    }

    .preface-section {
      width: min(720px, 100%);
      margin: 0 auto 42px;
    }

    .preface-section h3,
    .future-letter h3 {
      margin: 0 0 12px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 400;
      letter-spacing: .08em;
    }

    .growth-line {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      width: min(760px, 100%);
      margin: 46px auto;
      border-top: 1px solid rgba(29,26,21,.18);
    }

    .growth-line div {
      position: relative;
      padding: 22px 16px 0 0;
    }

    .growth-line div::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 0;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--ember);
    }

    .growth-line strong {
      display: block;
      margin-bottom: 8px;
      font-family: "Times New Roman", Georgia, serif;
      color: var(--ember);
      letter-spacing: .12em;
    }

    .growth-line span {
      color: rgba(29,26,21,.62);
      font-size: 13px;
      line-height: 1.7;
    }

    .future-letter {
      width: min(720px, 100%);
      margin: 50px auto 0;
      padding: clamp(22px, 4vw, 38px);
      border-left: 3px solid var(--ember);
      background: rgba(255,255,255,.3);
    }

    .page-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 34px;
    }

    .card {
      padding: 20px;
      border: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      background: color-mix(in srgb, currentColor 5%, transparent);
    }

    .card h3 {
      margin: 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 26px;
      font-weight: 400;
    }

    .user-entries {
      margin-top: 42px;
      padding-top: 24px;
      border-top: 1px solid color-mix(in srgb, currentColor 18%, transparent);
    }

    .user-entries-title {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 12px;
      letter-spacing: .28em;
      text-transform: uppercase;
    }

    .user-entry {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      background: color-mix(in srgb, currentColor 5%, transparent);
    }

    .user-entry h3 {
      margin: 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 28px;
      font-weight: 400;
    }

    .user-entry-meta {
      margin-top: 8px;
      color: color-mix(in srgb, currentColor 52%, transparent);
      font-size: 12px;
      letter-spacing: .08em;
    }

    .user-entry-body {
      white-space: pre-wrap;
    }

    .entry-toolbar {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .entry-toolbar button {
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      background: color-mix(in srgb, currentColor 5%, transparent);
      color: currentColor;
      padding: 7px 11px;
      font-size: 13px;
    }

    .profile-dossier {
      display: grid;
      grid-template-columns: minmax(220px, .8fr) minmax(320px, 1.2fr);
      gap: 22px;
      margin-top: 34px;
    }

    .profile-id,
    .mission-board,
    .growth-route,
    .lab-file,
    .mind-card,
    .library-note {
      border: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      background: color-mix(in srgb, currentColor 5%, transparent);
    }

    .profile-id {
      padding: 24px;
    }

    .profile-id strong {
      display: block;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(34px, 5vw, 60px);
      font-weight: 400;
      letter-spacing: .08em;
    }

    .profile-level {
      margin-top: 12px;
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .trait-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }

    .trait-tags span {
      border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
      padding: 7px 10px;
      font-size: 13px;
    }

    .mission-board {
      display: grid;
      gap: 16px;
      padding: 24px;
    }

    .mission-board h3,
    .growth-route h3,
    .lab-file h3,
    .mind-card h3,
    .library-note h3 {
      margin: 0;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 28px;
      font-weight: 400;
    }

    .growth-route {
      grid-column: 1 / -1;
      padding: 22px;
    }

    .route-line {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .route-line span {
      border-top: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      padding-top: 12px;
      color: color-mix(in srgb, currentColor 68%, transparent);
      font-size: 13px;
    }

    .lab-board {
      display: grid;
      gap: 18px;
      margin-top: 34px;
    }

    .lab-status {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(244,237,223,.16);
    }

    .lab-status strong {
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(30px, 4vw, 52px);
      font-weight: 400;
    }

    .lab-code {
      color: #ffd0a7;
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: .18em;
    }

    .lab-progress {
      grid-column: 1 / -1;
      height: 12px;
      border: 1px solid rgba(244,237,223,.18);
      background: rgba(244,237,223,.08);
    }

    .lab-progress span {
      display: block;
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, var(--ember), #ffd0a7);
    }

    .lab-files {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .lab-file {
      padding: 20px;
    }

    .mind-map {
      position: relative;
      min-height: 520px;
      margin-top: 30px;
      border: 1px solid rgba(29,26,21,.12);
      background:
        radial-gradient(circle at 50% 50%, rgba(162,77,50,.16), transparent 24%),
        radial-gradient(circle at 24% 28%, rgba(87,124,132,.12), transparent 20%);
      overflow: hidden;
    }

    .mind-map::before,
    .mind-map::after {
      content: "";
      position: absolute;
      inset: 18%;
      border: 1px solid rgba(29,26,21,.1);
      transform: rotate(28deg);
      pointer-events: none;
    }

    .mind-map::after {
      inset: 28% 12%;
      transform: rotate(-18deg);
    }

    .mind-core,
    .mind-node {
      position: absolute;
      z-index: 1;
    }

    .mind-core {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 150px;
      height: 150px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(29,26,21,.18);
      background: rgba(255,255,255,.36);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 28px;
    }

    .mind-node {
      width: min(220px, 42%);
    }

    .mind-node summary {
      cursor: pointer;
      list-style: none;
      border: 1px solid rgba(29,26,21,.18);
      background: rgba(255,255,255,.42);
      padding: 12px 14px;
      color: var(--ember);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 24px;
    }

    .mind-node summary::-webkit-details-marker {
      display: none;
    }

    .mind-node p {
      margin: 8px 0 0;
      padding: 12px;
      border-left: 2px solid var(--ember);
      background: rgba(255,255,255,.48);
      font-size: 14px;
      line-height: 1.8;
    }

    .mind-node.ai { left: 8%; top: 16%; }
    .mind-node.machine { right: 8%; top: 18%; }
    .mind-node.create { left: 10%; bottom: 18%; }
    .mind-node.future { right: 12%; bottom: 16%; }

    .bookshelf {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 34px;
    }

    .book-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
      min-height: 150px;
      padding: 18px;
      border-bottom: 8px solid rgba(29,26,21,.22);
      background: linear-gradient(180deg, transparent, rgba(29,26,21,.06));
    }

    .book-spine {
      flex: 1;
      min-width: 90px;
      border: 1px solid rgba(29,26,21,.18);
      background: linear-gradient(135deg, #7f3f2c, #ead8bd);
      color: #19130e;
    }

    .book-spine summary {
      min-height: 150px;
      cursor: pointer;
      list-style: none;
      display: grid;
      align-content: end;
      justify-items: start;
      padding: 14px;
      writing-mode: horizontal-tb;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 22px;
      letter-spacing: .12em;
    }

    .book-spine summary::-webkit-details-marker {
      display: none;
    }

    .book-spine p {
      margin: 0;
      padding: 14px;
      background: rgba(247,240,223,.92);
      writing-mode: horizontal-tb;
      font-size: 14px;
      line-height: 1.8;
    }

    .library-note {
      padding: 20px;
    }

    .gallery-wall {
      display: grid;
      grid-template-columns: 1.2fr .8fr .8fr;
      grid-auto-rows: 150px;
      gap: 12px;
      margin-top: 34px;
      perspective: 900px;
    }

    .memory-frame {
      position: relative;
      display: grid;
      align-content: end;
      padding: 16px;
      overflow: hidden;
      border: 1px solid rgba(244,237,223,.18);
      background:
        linear-gradient(180deg, transparent, rgba(0,0,0,.72)),
        url("assets/wenchang-sunset.png") center / cover;
      color: var(--cream);
      transform: rotate(var(--tilt, 0deg));
      transition: transform .25s ease, filter .25s ease;
    }

    .memory-frame:hover {
      transform: rotate(0deg) translateY(-4px);
      filter: brightness(1.08);
    }

    .memory-frame.large {
      grid-row: span 2;
      --tilt: -1.5deg;
    }

    .memory-frame:nth-child(2) { --tilt: 1.2deg; }
    .memory-frame:nth-child(3) { --tilt: -1deg; }
    .memory-frame:nth-child(4) { --tilt: .8deg; }
    .memory-frame:nth-child(5) { --tilt: -1.2deg; }

    .memory-frame strong {
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 26px;
      font-weight: 400;
    }

    .memory-frame span {
      margin-top: 6px;
      color: rgba(244,237,223,.72);
      font-size: 12px;
    }

    .timeline {
      display: grid;
      gap: 22px;
      margin-top: 34px;
    }

    .moment {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 22px;
      border-top: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      padding-top: 18px;
    }

    .year {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 24px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      grid-auto-rows: 160px;
      gap: 12px;
      margin-top: 34px;
    }

    .page-quote {
      margin-top: 34px;
      padding-left: 22px;
      border-left: 2px solid var(--ember);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.6;
    }

    .transition {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: none;
      place-items: center;
      background: rgba(5,7,10,.88);
      color: var(--cream);
      backdrop-filter: blur(18px);
    }

    .transition.is-active {
      display: grid;
      animation: fadeChapter 1s ease both;
    }

    .transition-card {
      text-align: center;
    }

    .transition-card small {
      color: var(--ember);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: .34em;
      text-transform: uppercase;
    }

    .transition-card strong {
      display: block;
      margin-top: 14px;
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: clamp(40px, 7vw, 96px);
      font-weight: 400;
      letter-spacing: .1em;
    }

    @keyframes fadeChapter {
      0% { opacity: 0; }
      18%, 72% { opacity: 1; }
      100% { opacity: 0; }
    }

    .photo {
      display: grid;
      align-content: end;
      padding: 18px;
      background:
        linear-gradient(180deg, transparent, rgba(0,0,0,.68)),
        url("assets/wenchang-sunset.png") center / cover;
      color: var(--cream);
      font-family: "STSong", "SimSun", "Songti SC", serif;
      font-size: 24px;
      letter-spacing: .08em;
      min-height: 140px;
    }

    .photo:first-child {
      grid-row: span 2;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .book {
        min-height: 100svh;
      }

      .menu-button {
        top: 18px;
        left: 18px;
        width: 44px;
        height: 44px;
      }

      .reader-tools {
        top: 18px;
        right: 18px;
        bottom: auto;
        left: auto;
        transform: none;
        width: max-content;
        max-width: calc(100vw - 36px);
        padding: 6px;
        gap: 6px;
        border: 1px solid rgba(244,237,223,.2);
        background: rgba(5,7,10,.62);
        backdrop-filter: blur(16px);
      }

      .progress-pill,
      .tool-button {
        min-height: 40px;
        padding: 0 12px;
        background: rgba(244,237,223,.08);
      }

      .popover {
        top: 76px;
        right: 18px;
        bottom: auto;
      }

      .view {
        position: relative;
        min-height: 100svh;
        display: none;
      }

      .view.is-active {
        display: grid;
      }

      .cover,
      .contents,
      .chapter {
        padding-top: 86px;
        padding-bottom: 34px;
      }

      .cover-panel {
        transform: none;
        padding-inline: 18px;
      }

      .contents-inner,
      .page-grid,
      .profile-dossier,
      .lab-files,
      .moment,
      .photo-grid,
      .gallery-wall,
      .chapter-meta,
      .growth-line {
        grid-template-columns: 1fr;
      }

      .growth-route {
        grid-column: auto;
      }

      .route-line {
        grid-template-columns: 1fr;
      }

      .mind-map {
        min-height: 720px;
      }

      .mind-core {
        top: 45%;
      }

      .mind-node {
        width: 74%;
      }

      .mind-node.ai { left: 4%; top: 6%; }
      .mind-node.machine { right: 4%; top: 24%; }
      .mind-node.create { left: 4%; bottom: 24%; }
      .mind-node.future { right: 4%; bottom: 6%; }

      .book-row {
        min-height: 180px;
        overflow-x: auto;
      }

      .book-spine {
        min-width: 82px;
      }

      .gallery-wall {
        grid-auto-rows: 170px;
      }

      .memory-frame.large {
        grid-row: span 1;
      }

      .preface-hero {
        min-height: 24vh;
      }

      .growth-line {
        border-top: 0;
        border-left: 1px solid rgba(29,26,21,.18);
        margin-left: 5px;
      }

      .growth-line div {
        padding: 0 0 24px 22px;
      }

      .growth-line div::before {
        top: 4px;
        left: -5px;
      }

      .chapter-link {
        grid-template-columns: 54px 1fr;
      }

      .chapter-list {
        border-left: 0;
        padding-right: 0;
        max-height: none;
      }

      .chapter-desc {
        grid-column: 2;
      }

      .page {
        max-height: none;
      }

      .photo:first-child {
        grid-row: span 1;
      }
    }
  </style>
</head>
<body>
  <main class="book">
    <button class="menu-button" id="menuButton" type="button" aria-label="打开目录">☰</button>
    <div class="reader-tools">
      <div class="progress-pill" id="progressPill">0%</div>
      <button class="tool-button" id="searchButton" type="button" aria-label="搜索">⌕</button>
      <button class="tool-button" id="addButton" type="button" aria-label="添加内容">＋</button>
    </div>

    <section class="view cover is-active" id="cover">
      <div class="cover-panel">
        <div class="kicker">A book still being written</div>
        <div class="roman-name"><span>Han</span><span>Pengfei</span></div>
        <div class="cover-line"></div>
        <h1>《韩鹏飞》</h1>
        <div class="cover-subtitle">一本仍在书写中的人生。</div>
        <div class="cover-actions">
          <button type="button" data-go="contents">翻开第一页</button>
          <button type="button" id="randomFromCover">随机读一页</button>
        </div>
      </div>
    </section>

    <section class="view contents" id="contents">
      <div class="contents-inner">
        <div class="contents-shelf">
          <div class="kicker">Table of Contents</div>
          <h2>开卷目录</h2>
          <p class="contents-note">这不是导航，是一本还在生长的书的索引。你可以从序章开始，也可以随手翻到任何一页。</p>
          <div class="today-card">
            <h3>今天的我</h3>
            <p>2026.7.17</p>
            <p>最近在做：把网站从主页改成 Digital Life Book。</p>
            <p>最近在想：一个人为什么要认真记录自己。</p>
            <button type="button" id="randomFromContents">今天，随机读一页</button>
          </div>
          <div class="recent-card">
            <h3>最近更新</h3>
            <p>新增《为什么记录》作为序章。</p>
            <p>补充阅读、日志、后记章节。</p>
          </div>
        </div>

        <div class="chapter-list" id="chapterList">
          <button class="chapter-link" type="button" data-chapter="why-record">
            <span class="chapter-number">00</span>
            <span class="chapter-title">为什么记录</span>
            <span class="chapter-desc">这本书为什么开始。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="about">
            <span class="chapter-number">01</span>
            <span class="chapter-title">关于我</span>
            <span class="chapter-desc">不是简历，而是一个人的来处。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="timeline">
            <span class="chapter-number">02</span>
            <span class="chapter-title">时间轴</span>
            <span class="chapter-desc">一路走来的故事。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="projects">
            <span class="chapter-number">03</span>
            <span class="chapter-title">创造</span>
            <span class="chapter-desc">创造过什么，也推翻过什么。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="thoughts">
            <span class="chapter-number">04</span>
            <span class="chapter-title">思考</span>
            <span class="chapter-desc">世界观、判断和那些为什么。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="reading">
            <span class="chapter-number">05</span>
            <span class="chapter-title">阅读</span>
            <span class="chapter-desc">影响我的书和笔记。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="photos">
            <span class="chapter-number">06</span>
            <span class="chapter-title">摄影</span>
            <span class="chapter-desc">生活留下来的光。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="ideas">
            <span class="chapter-number">07</span>
            <span class="chapter-title">想法仓库</span>
            <span class="chapter-desc">还没有成形的灵感。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="failures">
            <span class="chapter-number">08</span>
            <span class="chapter-title">失败记录</span>
            <span class="chapter-desc">真实的尝试和推翻。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="journal">
            <span class="chapter-number">09</span>
            <span class="chapter-title">每日记录</span>
            <span class="chapter-desc">每天一句话也可以。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="future">
            <span class="chapter-number">10</span>
            <span class="chapter-title">给未来的信</span>
            <span class="chapter-desc">写给几年后的自己。</span>
          </button>
          <button class="chapter-link" type="button" data-chapter="contact">
            <span class="chapter-number">11</span>
            <span class="chapter-title">后记</span>
            <span class="chapter-desc">联系与感谢。</span>
          </button>
        </div>
      </div>
    </section>

    <section class="view chapter" id="chapterView" data-tone="archive">
      <article class="page" id="page"></article>
    </section>

    <aside class="menu" id="menu">
      <div class="menu-grid">
        <div class="menu-title">Contents</div>
        <button type="button" data-go="cover">封面<small>Cover</small></button>
        <button type="button" data-go="contents">目录<small>Table of Contents</small></button>
        <button type="button" data-chapter="why-record">序章 · 为什么记录<small>CHAPTER 00</small></button>
        <button type="button" data-chapter="about">第一章 · 关于我<small>人物档案</small></button>
        <button type="button" data-chapter="timeline">第二章 · 时间轴<small>成长年轮</small></button>
        <button type="button" data-chapter="projects">第三章 · 创造<small>作品展</small></button>
        <button type="button" data-chapter="thoughts">第四章 · 思考<small>笔记本</small></button>
        <button type="button" data-chapter="reading">第五章 · 阅读<small>图书馆</small></button>
        <button type="button" data-chapter="photos">第六章 · 摄影<small>摄影集</small></button>
        <button type="button" data-chapter="ideas">第七章 · 想法仓库<small>灵感抽屉</small></button>
        <button type="button" data-chapter="failures">第八章 · 失败记录<small>真实档案</small></button>
        <button type="button" data-chapter="journal">第九章 · 每日记录<small>日历</small></button>
        <button type="button" data-chapter="future">第十章 · 给未来的信<small>信件</small></button>
        <button type="button" data-chapter="contact">后记 · 联系<small>Afterword</small></button>
      </div>
    </aside>

    <section class="popover" id="searchPanel" aria-label="搜索章节">
      <h3>搜索</h3>
      <input id="searchInput" placeholder="AI / 项目 / 阅读 / 失败">
      <div class="result-list" id="searchResults"></div>
    </section>

    <section class="popover" id="addPanel" aria-label="添加内容">
      <h3>添加内容</h3>
      <div class="action-list">
        <button type="button" data-entry-type="article">新增文章</button>
        <button type="button" data-entry-type="photo">新增图片</button>
        <button type="button" data-entry-type="project">新增项目</button>
        <button type="button" data-entry-type="note">新增笔记</button>
        <button type="button" data-entry-type="markdown">导入 Markdown</button>
      </div>
    </section>

    <section class="editor-panel" id="contentEditor" aria-label="内容编辑器">
      <h3 id="editorTitle">新增内容</h3>
      <input type="hidden" id="editingEntryId">
      <input type="hidden" id="entryType" value="article">
      <label>
        放到哪一章
        <select id="entryChapter"></select>
      </label>
      <label>
        标题
        <input id="entryTitle" placeholder="例如：一次新的思考">
      </label>
      <label>
        内容
        <textarea id="entryBody" placeholder="写下正文、照片链接、项目说明，或者 Markdown 内容。"></textarea>
      </label>
      <div class="editor-feedback" id="entryFeedback"></div>
      <div class="editor-actions">
        <button type="button" id="cancelEntryButton">取消</button>
        <button type="button" id="saveEntryButton">保存到这本书</button>
      </div>
    </section>

    <div class="transition" id="transition">
      <div class="transition-card">
        <small id="transitionNumber"></small>
        <strong id="transitionTitle"></strong>
      </div>
    </div>
  </main>

  <script>
    const chapters = {
      "why-record": {
        number: "00",
        title: "为什么记录",
        tone: "preface",
        html: `
          <section class="preface-hero">
            <div class="chapter-label">CHAPTER 00 / WHY RECORD</div>
            <h2>为什么记录？</h2>
            <div class="preface-lede">因为没有记录的经历，最终会消失。</div>
          </section>
          <div class="chapter-meta">
            <div>阅读时间：<span>3 分钟</span></div>
            <div>创建时间：<span>2026.07.17</span></div>
            <div>最后修改：<span>2026.07.17</span></div>
            <div>当前状态：<span>探索 AI / 创造工具 / 寻找方向</span></div>
          </div>

    const views = document.querySelectorAll(".view");
    const page = document.getElementById("page");
    const chapterView = document.getElementById("chapterView");
    const menu = document.getElementById("menu");
    const transition = document.getElementById("transition");
    const transitionNumber = document.getElementById("transitionNumber");
    const transitionTitle = document.getElementById("transitionTitle");
    const progressPill = document.getElementById("progressPill");
    const searchPanel = document.getElementById("searchPanel");
    const addPanel = document.getElementById("addPanel");
    const contentEditor = document.getElementById("contentEditor");
    const editorTitle = document.getElementById("editorTitle");
    const editingEntryId = document.getElementById("editingEntryId");
    const entryType = document.getElementById("entryType");
    const entryChapter = document.getElementById("entryChapter");
    const entryTitle = document.getElementById("entryTitle");
    const entryBody = document.getElementById("entryBody");
    const entryFeedback = document.getElementById("entryFeedback");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    const STORAGE_KEY = "hanpengfei.lifeBook.entries";
    const entryTypeNames = {
      article: "文章",
      photo: "图片",
      project: "项目",
      note: "笔记",
      markdown: "Markdown"
    };
    const defaultChapterByType = {
      article: "thoughts",
      photo: "photos",
      project: "projects",
      note: "journal",
      markdown: "thoughts"
    };
    const chapterKeys = [
      "why-record",
      "about",
      "timeline",
      "projects",
      "thoughts",
      "reading",
      "photos",
      "ideas",
      "failures",
      "journal",
      "future",
      "contact"
    ];
    let currentChapterKey = chapterKeys[0];

    entryChapter.innerHTML = chapterKeys
      .map((key) => `<option value="${key}">${chapters[key].number}. ${chapters[key].title}</option>`)
      .join("");

    function showView(id) {
      views.forEach((view) => view.classList.toggle("is-active", view.id === id));
      menu.classList.remove("is-open");
      searchPanel.classList.remove("is-open");
      addPanel.classList.remove("is-open");
      contentEditor.classList.remove("is-open");
      if (id === "cover") {
        progressPill.textContent = "0%";
        history.replaceState(null, "", "#cover");
      }
      if (id === "contents") {
        progressPill.textContent = "目录";
        history.replaceState(null, "", "#contents");
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadEntries() {
      try {
        const entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(entries) ? entries : [];
      } catch {
        return [];
      }
    }

    function persistEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function renderUserEntries(key) {
      const entries = loadEntries().filter((entry) => entry.chapter === key);
      if (entries.length === 0) return "";
      return `
        <section class="user-entries">
          <div class="user-entries-title">Added By You</div>
          ${entries.map((entry) => `
            <article class="user-entry">
              <h3>${escapeHtml(entry.title)}</h3>
              <div class="user-entry-meta">${escapeHtml(entryTypeNames[entry.type] || "内容")} / ${escapeHtml(entry.createdAt)}</div>
              <p class="user-entry-body">${escapeHtml(entry.body)}</p>
              <div class="entry-toolbar">
                <button type="button" data-edit-entry="${escapeHtml(entry.id)}">编辑</button>
                <button type="button" data-delete-entry="${escapeHtml(entry.id)}">删除</button>
              </div>
            </article>
          `).join("")}
        </section>
      `;
    }

    function openEditor(type = "article", chapter = currentChapterKey, entry = null) {
      const resolvedType = entry?.type || type;
      editorTitle.textContent = entry ? "修改内容" : `新增${entryTypeNames[resolvedType] || "内容"}`;
      editingEntryId.value = entry?.id || "";
      entryType.value = resolvedType;
      entryChapter.value = entry?.chapter || chapter || defaultChapterByType[resolvedType] || "thoughts";
      entryTitle.value = entry?.title || "";
      entryBody.value = entry?.body || "";
      entryFeedback.textContent = "内容会保存在当前浏览器里。";
      searchPanel.classList.remove("is-open");
      addPanel.classList.remove("is-open");
      contentEditor.classList.add("is-open");
      entryTitle.focus();
    }

    function saveEntry() {
      const title = entryTitle.value.trim();
      const body = entryBody.value.trim();
      if (!title || !body) {
        entryFeedback.textContent = "标题和内容都要填写。";
        return;
      }

      const entries = loadEntries();
      const id = editingEntryId.value || `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const existingIndex = entries.findIndex((entry) => entry.id === id);
      const nextEntry = {
        id,
        type: entryType.value,
        chapter: entryChapter.value,
        title,
        body,
        createdAt: existingIndex >= 0 ? entries[existingIndex].createdAt : new Date().toLocaleDateString("zh-CN")
      };

      if (existingIndex >= 0) entries[existingIndex] = nextEntry;
      else entries.unshift(nextEntry);
      persistEntries(entries);
      contentEditor.classList.remove("is-open");
      renderSearch(searchInput.value);
      openChapter(nextEntry.chapter);
    }

    function deleteEntry(id) {
      persistEntries(loadEntries().filter((entry) => entry.id !== id));
      renderSearch(searchInput.value);
      openChapter(currentChapterKey);
    }

    function openChapter(key) {
      const chapter = chapters[key];
      if (!chapter) return;
      currentChapterKey = key;
      const index = chapterKeys.indexOf(key);
      const progress = Math.round(((index + 1) / chapterKeys.length) * 100);
      const previousKey = chapterKeys[(index - 1 + chapterKeys.length) % chapterKeys.length];
      const nextKey = chapterKeys[(index + 1) % chapterKeys.length];
      const previousTitle = chapters[previousKey].title;
      const nextTitle = chapters[nextKey].title;
      transitionNumber.textContent = `Chapter ${chapter.number}`;
      transitionTitle.textContent = chapter.title;
      transition.classList.remove("is-active");
      void transition.offsetWidth;
      transition.classList.add("is-active");
      window.setTimeout(() => {
        chapterView.dataset.tone = chapter.tone;
        progressPill.textContent = `${progress}%`;
        page.innerHTML = chapter.html + renderUserEntries(key) + `
          <div class="chapter-actions">
            <button type="button" data-chapter="${previousKey}">← 上一页：${previousTitle}</button>
            <button type="button" data-go="contents">回到目录</button>
            <button type="button" data-chapter="${nextKey}">下一页：${nextTitle} →</button>
          </div>
        `;
        showView("chapterView");
        history.replaceState(null, "", `#chapter/${key}`);
      }, 360);
      window.setTimeout(() => transition.classList.remove("is-active"), 980);
    }

    function randomChapter() {
      const key = chapterKeys[Math.floor(Math.random() * chapterKeys.length)];
      openChapter(key);
    }

    document.addEventListener("click", (event) => {
      const go = event.target.closest("[data-go]");
      if (go) showView(go.dataset.go);

      const chapter = event.target.closest("[data-chapter]");
      if (chapter) openChapter(chapter.dataset.chapter);

      if (event.target.closest("[data-random]")) randomChapter();

      const entryButton = event.target.closest("[data-entry-type]");
      if (entryButton) {
        const type = entryButton.dataset.entryType;
        openEditor(type, defaultChapterByType[type] || currentChapterKey);
      }

      const editButton = event.target.closest("[data-edit-entry]");
      if (editButton) {
        const entry = loadEntries().find((item) => item.id === editButton.dataset.editEntry);
        if (entry) openEditor(entry.type, entry.chapter, entry);
      }

      const deleteButton = event.target.closest("[data-delete-entry]");
      if (deleteButton) deleteEntry(deleteButton.dataset.deleteEntry);
    });

    document.getElementById("menuButton").addEventListener("click", () => {
      menu.classList.add("is-open");
    });

    document.getElementById("randomFromCover").addEventListener("click", randomChapter);
    document.getElementById("randomFromContents").addEventListener("click", randomChapter);

    document.getElementById("searchButton").addEventListener("click", () => {
      addPanel.classList.remove("is-open");
      searchPanel.classList.toggle("is-open");
      searchInput.focus();
    });

    document.getElementById("addButton").addEventListener("click", () => {
      searchPanel.classList.remove("is-open");
      contentEditor.classList.remove("is-open");
      addPanel.classList.toggle("is-open");
    });

    document.getElementById("saveEntryButton").addEventListener("click", saveEntry);
    document.getElementById("cancelEntryButton").addEventListener("click", () => {
      contentEditor.classList.remove("is-open");
    });

    function renderSearch(query = "") {
      const normalized = query.trim().toLowerCase();
      searchResults.innerHTML = "";
      chapterKeys
        .filter((key) => {
          const chapter = chapters[key];
          const entryText = loadEntries()
            .filter((entry) => entry.chapter === key)
            .map((entry) => `${entry.title} ${entry.body}`)
            .join(" ");
          return !normalized || `${chapter.title} ${chapter.html} ${entryText}`.toLowerCase().includes(normalized);
        })
        .forEach((key) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = `${chapters[key].number}. ${chapters[key].title}`;
          button.addEventListener("click", () => openChapter(key));
          searchResults.appendChild(button);
        });
    }

    searchInput.addEventListener("input", () => renderSearch(searchInput.value));
    renderSearch();

    function restoreFromHash() {
      const hash = decodeURIComponent(location.hash || "");
      if (hash.startsWith("#chapter/")) {
        openChapter(hash.replace("#chapter/", ""));
      } else if (hash === "#contents") {
        showView("contents");
      } else {
        showView("cover");
      }
    }

    window.addEventListener("hashchange", restoreFromHash);
    restoreFromHash();

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (contentEditor.classList.contains("is-open")) contentEditor.classList.remove("is-open");
        else if (addPanel.classList.contains("is-open")) addPanel.classList.remove("is-open");
        else if (searchPanel.classList.contains("is-open")) searchPanel.classList.remove("is-open");
        else if (menu.classList.contains("is-open")) menu.classList.remove("is-open");
        else showView("contents");
      }
      if (!document.getElementById("chapterView").classList.contains("is-active")) return;
      const index = chapterKeys.indexOf(currentChapterKey);
      if (event.key === "ArrowLeft") {
        openChapter(chapterKeys[(index - 1 + chapterKeys.length) % chapterKeys.length]);
      }
      if (event.key === "ArrowRight") {
        openChapter(chapterKeys[(index + 1) % chapterKeys.length]);
      }
    });
  </script>
</body>
</html>
